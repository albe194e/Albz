version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "schema.sql"
    queries:
      - "queries"
    gen:
      go:
        package: "db"
        out: "generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true